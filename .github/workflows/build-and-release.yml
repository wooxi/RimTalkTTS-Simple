name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore Source/RimTalkTTS.Simple.csproj

      - name: Build
        run: dotnet build Source/RimTalkTTS.Simple.csproj -c Release --no-restore

      - name: Create Mod Package
        run: |
          $version = "${{ github.ref_name }}" -replace '^v', ''
          $zipName = "RimTalkTTS-Simple-v$version.zip"
          Compress-Archive -Path About,1.6,Languages,Textures,LICENSE,README.md -DestinationPath $zipName
          echo "zipName=$zipName" >> $env:GITHUB_ENV

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: RimTalkTTS-Simple-v*.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
